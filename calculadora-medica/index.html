<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Médica</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--verde:#4F5B4A;
--dourado:#C2A46D;
--off:#F8F7F5;
--off2:#EAE6DF;
--texto:#2F332D;
}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:linear-gradient(180deg,var(--off),var(--off2));
color:var(--texto);
}

.topbar{
height:68px;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
border-bottom:1px solid rgba(194,164,109,.35);
}

.brand h1{
margin:0;
font-family:'Playfair Display',serif;
color:var(--verde);
font-size:24px;
}

.container{
max-width:980px;
margin:auto;
padding:24px;
}

.card{
background:#fff;
border-radius:24px;
padding:24px;
margin-bottom:20px;
border:1px solid rgba(194,164,109,.35);
}

.grid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
}

label{
display:block;
margin-bottom:6px;
color:var(--verde);
font-size:12px;
font-weight:600;
}

input,select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid rgba(79,91,74,.25);
font-family:'Montserrat',sans-serif;
}

.btn{
width:100%;
margin-top:14px;
padding:15px;
border-radius:16px;
border:1px solid var(--verde);
background:var(--verde);
color:#fff;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<header class="topbar">
<div class="brand">
<h1>Calculadora Médica</h1>
</div>
</header>

<main class="container">

<section class="card">

<h2>Calculadora de doses</h2>

<div class="grid">

<div>
<label>Peso do paciente (kg)</label>
<input type="number" id="peso">
</div>

<div>
<label>Medicamento</label>
<select id="medicamento">
<option>Dipirona</option>
<option>Paracetamol</option>
<option>Ibuprofeno</option>
<option>Ondansetrona</option>
<option>Midazolam intranasal</option>
<option>Atropina</option>
<option>Etomidato</option>
<option>Cetamina</option>
<option>Fentanil</option>
<option>Suxametônio</option>
<option>Rocurônio</option>
</select>
</div>

</div>

<button class="btn">
Calcular dose
</button>

</section>

<section class="card">

<h2>Holliday-Segar / Montagem de solução</h2>

<div class="grid">

<div>
<label>Peso (kg)</label>
<input type="number" id="pesoHid">
</div>

<div>
<label>% da hidratação</label>
<select>
<option>50%</option>
<option>60%</option>
<option>70%</option>
<option>80%</option>
<option>90%</option>
<option selected>100%</option>
<option>120%</option>
<option>150%</option>
</select>
</div>

<div>
<label>% de sódio</label>
<input type="number" value="40">
</div>

<div>
<label>% de potássio</label>
<input type="number" value="20">
</div>

<div>
<label>Fonte de sódio</label>
<select>
<option>NaCl 10%</option>
<option>NaCl 20%</option>
</select>
</div>

<div>
<label>Fonte de potássio</label>
<select>
<option>KCl 19,1%</option>
<option>KCl 10%</option>
</select>
</div>

</div>

<button class="btn">
Calcular solução
</button>

</section>

</main>

</body>
</html>
